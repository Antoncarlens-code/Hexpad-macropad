<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" font-family="Helvetica,Arial,sans-serif">
  <style>
    .wire{stroke:#1f6feb;stroke-width:2;fill:none}
    .gnd{stroke:#444;stroke-width:2;fill:none}
    .comp{fill:#fff;stroke:#222;stroke-width:2}
    .lbl{font-size:13px;fill:#111}
    .pin{font-size:12px;fill:#1f6feb;font-weight:bold}
    .title{font-size:20px;fill:#111;font-weight:bold}
    .sub{font-size:12px;fill:#555}
    .net{font-size:11px;fill:#777}
  </style>

  <text x="30" y="34" class="title">Hexpad — Schematic (6 keys + EC11 encoder, direct-wired)</text>
  <text x="30" y="54" class="sub">XIAO RP2040 · internal pull-ups · no diodes (6 keys &lt; 8) · D4/D5 reserved for future OLED</text>

  <!-- XIAO -->
  <rect x="360" y="120" width="180" height="380" rx="6" class="comp"/>
  <text x="450" y="146" text-anchor="middle" class="lbl" font-weight="bold">U1  XIAO RP2040</text>
  <text x="450" y="162" text-anchor="middle" class="sub">(soldered to back, USB-C on -Y)</text>

  <!-- left pins (switch side) -->
  <g class="pin" text-anchor="start">
    <text x="372" y="196">D0  SW1</text>
    <text x="372" y="232">D1  SW2</text>
    <text x="372" y="268">D2  SW3</text>
    <text x="372" y="304">D3  SW4</text>
    <text x="372" y="340">D6  SW5</text>
    <text x="372" y="376">D7  SW6</text>
    <text x="372" y="430" fill="#999">D4  (SDA, OLED)</text>
    <text x="372" y="452" fill="#999">D5  (SCL, OLED)</text>
  </g>
  <!-- right pins (encoder side + power) -->
  <g class="pin" text-anchor="end">
    <text x="528" y="196">ENC A  D8</text>
    <text x="528" y="232">ENC B  D9</text>
    <text x="528" y="268">ENC SW D10</text>
    <text x="528" y="430" fill="#0a0">3V3</text>
    <text x="528" y="470" fill="#444">GND</text>
  </g>

  <!-- pin stubs left -->
  <g class="wire">
    <line x1="360" y1="192" x2="320" y2="192"/>
    <line x1="360" y1="228" x2="300" y2="228"/>
    <line x1="360" y1="264" x2="280" y2="264"/>
    <line x1="360" y1="300" x2="320" y2="300"/>
    <line x1="360" y1="336" x2="300" y2="336"/>
    <line x1="360" y1="372" x2="280" y2="372"/>
  </g>

  <!-- Switches column -->
  <g>
    <!-- SW1 -->
    <rect x="190" y="180" width="60" height="24" rx="4" class="comp"/>
    <text x="220" y="197" text-anchor="middle" class="lbl">SW1</text>
    <line x1="250" y1="192" x2="320" y2="192" class="wire"/>
    <line x1="190" y1="192" x2="120" y2="192" class="gnd"/>
    <!-- SW2 -->
    <rect x="170" y="216" width="60" height="24" rx="4" class="comp"/>
    <text x="200" y="233" text-anchor="middle" class="lbl">SW2</text>
    <line x1="230" y1="228" x2="300" y2="228" class="wire"/>
    <line x1="170" y1="228" x2="120" y2="228" class="gnd"/>
    <!-- SW3 -->
    <rect x="150" y="252" width="60" height="24" rx="4" class="comp"/>
    <text x="180" y="269" text-anchor="middle" class="lbl">SW3</text>
    <line x1="210" y1="264" x2="280" y2="264" class="wire"/>
    <line x1="150" y1="264" x2="120" y2="264" class="gnd"/>
    <!-- SW4 -->
    <rect x="190" y="288" width="60" height="24" rx="4" class="comp"/>
    <text x="220" y="305" text-anchor="middle" class="lbl">SW4</text>
    <line x1="250" y1="300" x2="320" y2="300" class="wire"/>
    <line x1="190" y1="300" x2="120" y2="300" class="gnd"/>
    <!-- SW5 -->
    <rect x="170" y="324" width="60" height="24" rx="4" class="comp"/>
    <text x="200" y="341" text-anchor="middle" class="lbl">SW5</text>
    <line x1="230" y1="336" x2="300" y2="336" class="wire"/>
    <line x1="170" y1="336" x2="120" y2="336" class="gnd"/>
    <!-- SW6 -->
    <rect x="150" y="360" width="60" height="24" rx="4" class="comp"/>
    <text x="180" y="377" text-anchor="middle" class="lbl">SW6</text>
    <line x1="210" y1="372" x2="280" y2="372" class="wire"/>
    <line x1="150" y1="372" x2="120" y2="372" class="gnd"/>
  </g>

  <!-- left GND rail -->
  <line x1="120" y1="180" x2="120" y2="384" class="gnd"/>
  <line x1="120" y1="384" x2="120" y2="560" class="gnd"/>
  <!-- GND symbol bottom-left -->
  <line x1="120" y1="560" x2="120" y2="572" class="gnd"/>
  <line x1="104" y1="572" x2="136" y2="572" class="gnd"/>
  <line x1="110" y1="580" x2="130" y2="580" class="gnd"/>
  <line x1="116" y1="588" x2="124" y2="588" class="gnd"/>
  <text x="148" y="576" class="net">GND</text>

  <!-- Encoder -->
  <rect x="640" y="170" width="120" height="120" rx="6" class="comp"/>
  <text x="700" y="206" text-anchor="middle" class="lbl" font-weight="bold">ENC1</text>
  <text x="700" y="224" text-anchor="middle" class="sub">EC11</text>
  <text x="700" y="244" text-anchor="middle" class="sub">A  B  SW</text>
  <text x="700" y="262" text-anchor="middle" class="sub">common → GND</text>
  <g class="wire">
    <line x1="640" y1="192" x2="540" y2="192"/>
    <line x1="640" y1="228" x2="540" y2="228"/>
    <line x1="640" y1="264" x2="540" y2="264"/>
  </g>
  <!-- encoder common to GND -->
  <line x1="700" y1="290" x2="700" y2="540" class="gnd"/>
  <line x1="700" y1="540" x2="540" y2="540" class="gnd"/>

  <!-- XIAO GND to rail -->
  <line x1="540" y1="466" x2="640" y2="466" class="gnd"/>
  <line x1="640" y1="466" x2="640" y2="540" class="gnd"/>
  <line x1="640" y1="540" x2="700" y2="540" class="gnd"/>
  <line x1="540" y1="466" x2="540" y2="540" class="gnd"/>

  <!-- legend -->
  <rect x="600" y="470" width="270" height="120" rx="6" fill="#fafafa" stroke="#ddd"/>
  <text x="616" y="492" class="sub" font-weight="bold">Notes</text>
  <text x="616" y="512" class="net">• Each switch: one leg → its D-pin, other leg → GND.</text>
  <text x="616" y="528" class="net">• Firmware enables INPUT_PULLUP on each D-pin.</text>
  <text x="616" y="544" class="net">• Encoder A/B/SW → D8/D9/D10, common → GND.</text>
  <text x="616" y="560" class="net">• 3V3 only needed if you add an OLED / RGB later.</text>
  <text x="616" y="576" class="net">• No diodes: direct wiring is valid up to 7 keys.</text>
</svg>
